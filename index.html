<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="Test.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f7f9fc;
      color: #333;
    }

    /* ══════════════════════════════════
       TOP NAVIGATION — complete overhaul
       ══════════════════════════════════ */

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 70px;
      background: #0a1f0a;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .nav-logo {
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .nav-logo img {
      height: 36px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.92;
    }

    .nav-logo-wordmark {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: #e8f0e8;
      letter-spacing: 0.01em;
      line-height: 1;
    }

    .nav-logo-wordmark em {
      font-style: italic;
      color: #7ec87e;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      list-style: none;
    }

    .nav-links li a {
      text-decoration: none;
      color: #b8ccb8;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: 6px;
      display: block;
      position: relative;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links li a::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 18px;
      right: 18px;
      height: 1px;
      background: #7ec87e;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }

    .nav-links li a:hover {
      color: #e8f0e8;
      background: rgba(255,255,255,0.05);
    }

    .nav-links li a:hover::after {
      transform: scaleX(1);
    }

    .nav-links li a.active {
      color: #0a1f0a;
      background: #7ec87e;
      font-weight: 500;
    }

    .nav-links li a.active::after {
      display: none;
    }

    .shadow-line { display: none; }

    @media (max-width: 700px) {
      nav { padding: 0 20px; height: 60px; }
      .nav-logo-wordmark { display: none; }
      .nav-links li a { padding: 7px 11px; font-size: 12px; letter-spacing: 0.04em; }
    }

    .hero-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 40px;
      gap: 40px;
    }

    .text-content {
      flex: 1;
      max-width: 550px;
    }

    .text-content h1 {
      font-size: clamp(24px, 3vw, 42px);
      line-height: 1.2;
      margin-bottom: 20px;
      color: #1a1a1a;
    }

    .text-content p {
      font-size: clamp(14px, 1.5vw, 18px);
      line-height: 1.6;
      color: #555;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background-color: #0061fe;
      color: white;
    }

    .btn-primary:hover {
      background-color: #043075;
    }

    .btn-secondary {
      background-color: transparent;
      color: #333;
    }

    .btn-secondary:hover {
      background-color: #14b8e0;
    }

    .slideshow-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .slideshow-container {
      width: 100%;
      max-width: 600px;
      position: relative;
      border: 5px solid #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      background-color: #000;
    }

    .mySlides {
      display: none;
    }

    .mySlides img {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
    }

    .fade {
      animation-name: fade;
      animation-duration: 1s;
    }

    @keyframes fade {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }

    .prev, .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      padding: 16px;
      color: rgb(255, 255, 255);
      font-weight: bold;
      font-size: 18px;
      transition: 0.3s ease;
      background-color: rgba(0,0,0,0.3);
      user-select: none;
      text-decoration: none;
    }

    .next { right: 0; }
    .prev { left: 0; }

    .prev:hover, .next:hover {
      background-color: rgba(0,0,0,0.8);
    }

    @media (max-width: 900px) {
      .hero-section {
        flex-direction: column;
        text-align: center;
        padding: 40px 20px;
      }

      .text-content {
        max-width: 100%;
      }

      .buttons {
        justify-content: center;
      }

      .slideshow-container {
        max-width: 100%;
      }
    }

    @media (min-width: 1400px) {
      .hero-section {
        padding: 80px 60px;
      }

      .slideshow-container {
        max-width: 750px;
      }
    }
  </style>
</head>
<body>

    <!-- Nav -->
  <nav>
    <a href="index.html" class="nav-logo">
      <img src="Images/Logo.png" alt="Logo"/>
      <span class="nav-logo-wordmark">Second<em>hand</em></span>
    </a>
    <ul class="nav-links">
      <li><a href="Market.html">Market</a></li>
      <li><a href="Polls.html">Polls</a></li>
      <li><a href="AboutUs.html">About Us</a></li>
      <li><a href="Guide.html">Guide</a></li>
    </ul>
  </nav>

  <!-- Hero -->
  <section class="hero-section">
    <div class="text-content">
      <h1>One man's trash is another man's treasure.</h1>
      <p>Explore a wide variety of tools, furniture and household items at unbeatable prices.</p>
      <div class="buttons">
        <a href="#" class="btn btn-primary">Start Browsing</a>
        <a href="#" class="btn btn-secondary">Create Account ➔</a>
      </div>
    </div>

    <div class="slideshow-wrapper">
      <div class="slideshow-container">
        <div class="mySlides fade">
          <img src="Images/Forest1.png" alt="Slide 1">
        </div>
        <div class="mySlides fade">
          <img src="Images/mower.jpg" alt="Slide 2">
        </div>
        <div class="mySlides fade">
          <img src="Images/sofa1.png" alt="Slide 3">
        </div>

        <a class="prev" href="javascript:void(0)" onclick="plusSlides(-1)">❮</a>
        <a class="next" href="javascript:void(0)" onclick="plusSlides(1)">❯</a>
      </div>
    </div>
  </section>

  <script>
    let slideIndex = 0;
    let slideTimer;

    showSlides();
    resetTimer();

    function plusSlides(n) {
      slideIndex += n;
      showSlides();
      resetTimer();
    }

    function showSlides() {
      let slides = document.getElementsByClassName("mySlides");
      if (slideIndex >= slides.length) { slideIndex = 0; }
      if (slideIndex < 0) { slideIndex = slides.length - 1; }
      for (let slide of slides) { slide.style.display = "none"; }
      slides[slideIndex].style.display = "block";
    }

    function resetTimer() {
      clearInterval(slideTimer);
      slideTimer = setInterval(() => {
        slideIndex++;
        showSlides();
      }, 4000);
    }
  </script>

</body>
</html>
